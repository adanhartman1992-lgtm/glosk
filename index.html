<!DOCTYPE html>

<title>Media Portal</title>

<body>
<h1>Content is loading...</h1>
<script>
// Этот JS нужен, чтобы реальный юзер, если вдруг попадет сюда из поиска,
// автоматически перенаправлялся на твой реальный сайт
const urlParams = new URLSearchParams(window.location.search);
const pageId = urlParams.get('id');
if (pageId) {
window.location.href = "https://buzzer.blog/join/channel/" + pageId;
}
</script>
</body>
